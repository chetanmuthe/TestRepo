<!-- paste near top of your template -->

<div class="login-container">
  <div class="overlay"></div>
  <div class="login-box">
    <h2>Welcome to Kattegat ⚔️</h2>
    <p>Enter the gates to your destiny</p>

    <form [formGroup]="LoginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" formControlName="Username" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" formControlName="Password"  placeholder="Enter your password" required>
      </div>

      <button type="submit" (click)="onLogin()">Login</button>
    </form>
  </div>
</div>
